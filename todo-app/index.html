<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, minimalist to-do application">
    <title>Minimal To-Do</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header>
            <h1>Tasks</h1>
            <p id="task-count">0 tasks</p>
        </header>

        <section class="input-section">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" autofocus>
            <button id="add-btn" aria-label="Add task">
                <!-- Plus Icon -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </section>

        <ul id="task-list" class="task-list">
            <!-- Tasks will be injected here by JavaScript -->
        </ul>
    </main>
    <script src="script.js"></script>
</body>
</html>
